{% extends "base.html" %}
{% block content %}

<div class="mb-7">
  <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">📤 Saisir une dépense</h1>
  <p class="text-sm text-gray-400 dark:text-slate-500 mt-0.5">Enregistrez une dépense manuelle</p>
</div>

<div class="max-w-lg">
  <div class="bg-white dark:bg-slate-900 rounded-3xl border border-gray-100 dark:border-slate-800 p-6">
    <form method="POST" class="space-y-4">

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Montant (FCFA)</label>
        <input type="number" name="montant" id="montant" step="1" min="1" placeholder="Ex: 5 000"
          required autofocus oninput="updatePreview()" class="jf-input text-base font-bold">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Description</label>
        <input type="text" name="description" placeholder="Ex: Taxi, Courses, Médicaments…" class="jf-input">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Catégorie</label>
        <select name="category_id" class="jf-input">
          {% for c in categories %}
          <option value="{{ c.id }}">{{ c.icon }} {{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Source -->
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-2">Source de la dépense</label>
        <div class="grid grid-cols-3 gap-2">
          <label id="btn-auto" onclick="setSource('auto')" class="cursor-pointer p-3 rounded-2xl border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-center transition">
            <input type="radio" name="source" value="auto" checked style="display:none">
            <div class="text-xl mb-1">🔄</div>
            <div class="text-xs font-bold text-gray-900 dark:text-white">Auto</div>
            <div class="text-[0.65rem] text-gray-400 dark:text-slate-500 mt-0.5">Budget→Réserve</div>
          </label>
          <label id="btn-budget" onclick="setSource('budget')" class="cursor-pointer p-3 rounded-2xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-center transition">
            <input type="radio" name="source" value="budget" style="display:none">
            <div class="text-xl mb-1">📅</div>
            <div class="text-xs font-bold text-gray-400 dark:text-slate-500">Budget</div>
            <div class="text-[0.65rem] text-gray-400 dark:text-slate-500 mt-0.5">{{ budget_bal|cfa }}</div>
          </label>
          <label id="btn-reserve" onclick="setSource('reserve')" class="cursor-pointer p-3 rounded-2xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-center transition">
            <input type="radio" name="source" value="reserve" style="display:none">
            <div class="text-xl mb-1">🏦</div>
            <div class="text-xs font-bold text-gray-400 dark:text-slate-500">Réserve</div>
            <div class="text-[0.65rem] text-gray-400 dark:text-slate-500 mt-0.5">{{ reserve_bal|cfa }}</div>
          </label>
        </div>
      </div>

      <!-- Prévisualisation -->
      <div id="preview-box" style="display:none" class="px-4 py-3.5 bg-gray-50 dark:bg-slate-800 rounded-2xl text-sm">
        <div id="preview-content"></div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Date</label>
        <input type="date" name="date" value="{{ today }}" class="jf-input">
      </div>

      <button class="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-2xl text-sm transition shadow-sm shadow-red-200 dark:shadow-none">💸 Enregistrer la dépense</button>
    </form>
  </div>
</div>

<!-- Jinja2 data passed via data attributes to avoid JS parse errors -->
<span id="jf-depense-data" data-budget="{{ budget_bal }}" data-reserve="{{ reserve_bal }}" style="display:none"></span>

<script>
const _d = document.getElementById('jf-depense-data').dataset;
const budgetBal  = parseFloat(_d.budget)  || 0;
const reserveBal = parseFloat(_d.reserve) || 0;
let currentSource = 'auto';

function fmt(n) { return Math.round(n).toLocaleString('fr-FR') + ' FCFA'; }

function setSource(s) {
  currentSource = s;
  const inactive = 'cursor-pointer p-3 rounded-2xl text-center transition border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900';
  const activeCls = {
    'auto':    'cursor-pointer p-3 rounded-2xl text-center transition border-2 border-blue-500 bg-blue-50',
    'budget':  'cursor-pointer p-3 rounded-2xl text-center transition border-2 border-emerald-500 bg-emerald-50',
    'reserve': 'cursor-pointer p-3 rounded-2xl text-center transition border-2 border-amber-500 bg-amber-50',
  };
  ['auto','budget','reserve'].forEach(k => {
    const el = document.getElementById('btn-' + k);
    el.className = k === s ? activeCls[k] : inactive;
    const titleEl = el.querySelector('.text-xs.font-bold');
    if (titleEl) titleEl.className = 'text-xs font-bold ' + (k === s ? 'text-gray-900 dark:text-white' : 'text-gray-400 dark:text-slate-500');
  });
  document.querySelector('input[name=source][value="' + s + '"]').checked = true;
  updatePreview();
}

function updatePreview() {
  const m   = parseFloat(document.getElementById('montant').value) || 0;
  const box = document.getElementById('preview-box');
  const cnt = document.getElementById('preview-content');
  if (m <= 0) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  let html = '';
  if (currentSource === 'budget') {
    html = m <= budgetBal
      ? `<span class="text-emerald-500 font-semibold">✅ Pris sur le budget semaine : ${fmt(m)}</span>`
      : `<span class="text-red-500 font-semibold">⚠️ Budget insuffisant — disponible : ${fmt(budgetBal)}</span>`;
  } else if (currentSource === 'reserve') {
    html = m <= reserveBal
      ? `<span class="text-amber-500 font-semibold">✅ Pris sur la réserve : ${fmt(m)}</span>`
      : `<span class="text-red-500 font-semibold">⚠️ Réserve insuffisante — disponible : ${fmt(reserveBal)}</span>`;
  } else {
    if (m <= budgetBal) {
      html = `<span class="text-blue-500 font-semibold">✅ Entièrement sur le budget semaine : ${fmt(m)}</span>`;
    } else if (m <= budgetBal + reserveBal) {
      const fromR = m - budgetBal;
      html = `<div class="text-blue-500 font-semibold mb-1">↳ Budget semaine : ${fmt(budgetBal)}</div><div class="text-amber-500 font-semibold">↳ Réserve (complément) : ${fmt(fromR)}</div>`;
    } else {
      html = `<span class="text-red-500 font-semibold">⚠️ Trop élevé. Maximum disponible : ${fmt(budgetBal + reserveBal)}</span>`;
    }
  }
  cnt.innerHTML = html;
}
</script>
{% endblock %}
