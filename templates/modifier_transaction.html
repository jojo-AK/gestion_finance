{% extends "base.html" %}
{% block content %}
<div class="mb-3">
  <h1 style="font-size:1.5rem; font-weight:700;">✏️ Modifier une transaction</h1>
  <p class="text-muted">Transaction du {{ t.date }} — {{ t.type }}</p>
</div>

<div style="max-width:520px;">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Montant (FCFA)</label>
        <input type="number" name="amount" step="1" min="0" value="{{ t.amount }}" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" value="{{ t.description or '' }}" placeholder="Description…">
      </div>
      {% if t.type in ('expense', 'expense_reserve') %}
      <div class="form-group">
        <label>Catégorie</label>
        <select name="category_id">
          <option value="">— Aucune —</option>
          {% for c in categories %}
          <option value="{{ c.id }}" {% if t.category_id == c.id %}selected{% endif %}>{{ c.icon }} {{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ t.date }}" required>
      </div>
      <div style="display:flex; gap:0.75rem;">
        <button class="btn btn-primary" style="flex:1;">✅ Enregistrer</button>
        <a href="/historique" class="btn btn-outline" style="flex:1; justify-content:center;">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
