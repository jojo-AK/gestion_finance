{% extends "base.html" %}
{% block content %}

<div class="mb-7">
  <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">✏️ Modifier une transaction</h1>
  <p class="text-sm text-gray-400 dark:text-slate-500 mt-0.5">Transaction du {{ t.date }} — {{ t.type }}</p>
</div>

<div class="max-w-lg">
  <div class="bg-white dark:bg-slate-900 rounded-3xl border border-gray-100 dark:border-slate-800 p-6">
    <form method="POST" class="space-y-4">

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Montant (FCFA)</label>
        <input type="number" name="amount" step="1" min="0" value="{{ t.amount }}" required class="jf-input text-base font-bold">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Description</label>
        <input type="text" name="description" value="{{ t.description or '' }}" placeholder="Description…" class="jf-input">
      </div>

      {% if t.type in ('expense', 'expense_reserve') %}
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Catégorie</label>
        <select name="category_id" class="jf-input">
          <option value="">— Aucune —</option>
          {% for c in categories %}
          <option value="{{ c.id }}" {% if t.category_id == c.id %}selected{% endif %}>{{ c.icon }} {{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Date</label>
        <input type="date" name="date" value="{{ t.date }}" required class="jf-input">
      </div>

      <div class="flex gap-3 pt-2">
        <button class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl text-sm transition shadow-sm shadow-blue-200 dark:shadow-none">✅ Enregistrer</button>
        <a href="/historique" class="flex-1 py-3 text-center border border-gray-200 dark:border-slate-700 text-sm font-semibold text-gray-600 dark:text-slate-400 rounded-2xl hover:border-blue-400 hover:text-blue-600 transition">Annuler</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
