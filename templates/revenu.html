{% extends "base.html" %}
{% block content %}

<div class="mb-7">
  <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">📥 Ajouter un revenu</h1>
  <p class="text-sm text-gray-400 dark:text-slate-500 mt-0.5">Choisissez comment répartir ce revenu</p>
</div>

<div class="max-w-lg">

  <!-- Sélecteur de mode -->
  <div class="grid grid-cols-2 gap-3 mb-5">
    <button type="button" id="btn-auto" onclick="setMode('auto')"
      class="p-4 rounded-2xl border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-left transition">
      <div class="font-bold text-gray-900 dark:text-white text-sm mb-0.5">🎚️ Mode automatique</div>
      <div class="text-xs text-gray-400 dark:text-slate-500">Curseur de pourcentage</div>
    </button>
    <button type="button" id="btn-manuel" onclick="setMode('manuel')"
      class="p-4 rounded-2xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-left transition">
      <div class="font-bold text-gray-500 dark:text-slate-400 text-sm mb-0.5">✏️ Mode manuel</div>
      <div class="text-xs text-gray-400 dark:text-slate-500">Saisir les montants</div>
    </button>
  </div>

  <div class="bg-white dark:bg-slate-900 rounded-3xl border border-gray-100 dark:border-slate-800 p-6">
    <form method="POST" id="revenu-form" class="space-y-4">
      <input type="hidden" name="mode" id="mode-input" value="auto">
      <input type="hidden" name="reserve_pct" id="reserve_pct_hidden" value="30">
      <input type="hidden" name="reserve_montant" id="reserve_montant_hidden" value="">
      <input type="hidden" name="budget_montant" id="budget_montant_hidden" value="">

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Montant total reçu (FCFA)</label>
        <input type="number" name="montant" id="montant" min="1" step="1"
          placeholder="Ex: 150 000" required autofocus oninput="onMontantChange()"
          class="jf-input">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Description</label>
        <input type="text" name="description" placeholder="Ex: Salaire, Freelance, Prime…" class="jf-input">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-1.5">Date</label>
        <input type="date" name="date" value="{{ now.strftime('%Y-%m-%d') }}" class="jf-input">
      </div>

      <!-- MODE AUTO -->
      <div id="section-auto">
        <label class="block text-xs font-semibold text-gray-500 dark:text-slate-400 mb-3">Part à mettre en réserve (épargne)</label>
        <div class="flex items-center gap-3 mb-2">
          <input type="range" id="reserve_range" min="0" max="100" value="30" step="5"
            oninput="onRangeChange(this.value)"
            class="flex-1 h-2 rounded-full accent-blue-600">
          <span id="range-display" class="text-sm font-bold text-blue-600 min-w-[3rem] text-right">30%</span>
        </div>
        <div class="flex justify-between text-xs">
          <span class="text-gray-500 dark:text-slate-400">Réserve : <strong id="reserve-pct" class="text-emerald-500">30%</strong></span>
          <span class="text-gray-500 dark:text-slate-400">Budget : <strong id="budget-pct" class="text-blue-500">70%</strong></span>
        </div>
      </div>

      <!-- MODE MANUEL -->
      <div id="section-manuel" style="display:none">
        <div class="px-3.5 py-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-xs text-blue-600 dark:text-blue-400 mb-3">
          💡 Saisis les montants. Le champ restant se complète automatiquement.
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-emerald-500 mb-1.5">🏦 Réserve (FCFA)</label>
            <input type="number" id="input-reserve" min="0" step="1" placeholder="0"
              oninput="onManuelChange('reserve')" class="jf-input text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-blue-500 mb-1.5">📅 Budget semaine (FCFA)</label>
            <input type="number" id="input-budget" min="0" step="1" placeholder="0"
              oninput="onManuelChange('budget')" class="jf-input text-sm">
          </div>
        </div>
        <div id="manuel-alert" style="display:none" class="mt-3 px-3.5 py-2.5 rounded-xl text-xs font-semibold bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-700/40"></div>
      </div>

      <!-- PRÉVISUALISATION -->
      <div id="preview" style="display:none" class="px-4 py-4 bg-gray-50 dark:bg-slate-800 rounded-2xl">
        <p class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-3">Répartition prévue</p>
        <div class="flex justify-between items-center mb-1.5 text-sm">
          <span class="text-gray-600 dark:text-slate-300">🏦 Réserve</span>
          <strong id="preview-reserve" class="text-emerald-500">—</strong>
        </div>
        <div class="flex justify-between items-center mb-3 text-sm">
          <span class="text-gray-600 dark:text-slate-300">📅 Budget semaine</span>
          <strong id="preview-budget" class="text-blue-500">—</strong>
        </div>
        <div class="h-3 rounded-full overflow-hidden flex bg-gray-200 dark:bg-slate-700">
          <div id="bar-reserve" class="h-full bg-emerald-500 transition-all" style="width:30%"></div>
          <div id="bar-budget"  class="h-full bg-blue-500 flex-1 transition-all"></div>
        </div>
        <div class="flex justify-between text-xs text-gray-400 dark:text-slate-500 mt-1.5">
          <span id="preview-rpct">30%</span>
          <span id="preview-bpct">70%</span>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="w-full py-3 bg-emerald-500 text-white font-bold rounded-2xl text-sm transition opacity-50 cursor-not-allowed" disabled>
        ✅ Enregistrer le revenu
      </button>
    </form>
  </div>
</div>

<script>
let currentMode = 'auto';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-input').value = mode;
  const isAuto = mode === 'auto';
  const btnAuto   = document.getElementById('btn-auto');
  const btnManuel = document.getElementById('btn-manuel');
  btnAuto.className   = `p-4 rounded-2xl text-left transition border-2 ${isAuto ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900'}`;
  btnManuel.className = `p-4 rounded-2xl text-left transition ${!isAuto ? 'border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900'}`;
  const autoTitle   = btnAuto.querySelector('.font-bold');
  const manuelTitle = btnManuel.querySelector('.font-bold');
  autoTitle.className   = `font-bold text-sm mb-0.5 ${isAuto ? 'text-gray-900 dark:text-white' : 'text-gray-500 dark:text-slate-400'}`;
  manuelTitle.className = `font-bold text-sm mb-0.5 ${!isAuto ? 'text-gray-900 dark:text-white' : 'text-gray-500 dark:text-slate-400'}`;
  document.getElementById('section-auto').style.display   = isAuto ? 'block' : 'none';
  document.getElementById('section-manuel').style.display = isAuto ? 'none'  : 'block';
  document.getElementById('manuel-alert').style.display   = 'none';
  updatePreview();
}

function fmt(n) { return Math.round(n).toLocaleString('fr-FR') + ' FCFA'; }
function getMontant() { return parseFloat(document.getElementById('montant').value) || 0; }

function onMontantChange() {
  if (currentMode === 'manuel') {
    const m = getMontant();
    const r = parseFloat(document.getElementById('input-reserve').value) || 0;
    const b = parseFloat(document.getElementById('input-budget').value)  || 0;
    if (r > 0 && b === 0 && m > r) document.getElementById('input-budget').value  = Math.round(m - r);
    else if (b > 0 && r === 0 && m > b) document.getElementById('input-reserve').value = Math.round(m - b);
  }
  updatePreview();
}

function onRangeChange(v) {
  document.getElementById('range-display').textContent = v + '%';
  document.getElementById('reserve-pct').textContent   = v + '%';
  document.getElementById('budget-pct').textContent    = (100 - v) + '%';
  document.getElementById('reserve_pct_hidden').value  = v;
  updatePreview();
}

function onManuelChange(changed) {
  const m = getMontant();
  if (m <= 0) return;
  const rInput = document.getElementById('input-reserve');
  const bInput = document.getElementById('input-budget');
  const rVal = parseFloat(rInput.value) || 0;
  const bVal = parseFloat(bInput.value) || 0;
  if (changed === 'reserve' && rVal >= 0 && m - rVal >= 0) bInput.value = Math.round(m - rVal);
  else if (changed === 'budget' && bVal >= 0 && m - bVal >= 0) rInput.value = Math.round(m - bVal);
  updatePreview();
}

function updatePreview() {
  const m = getMontant();
  const preview = document.getElementById('preview');
  const btn     = document.getElementById('submit-btn');
  const alertBox = document.getElementById('manuel-alert');
  if (m <= 0) {
    preview.style.display = 'none';
    btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed'); btn.classList.remove('hover:bg-emerald-600', 'cursor-pointer');
    return;
  }
  let reservePart, budgetPart, valid = true;
  if (currentMode === 'auto') {
    const pct = parseInt(document.getElementById('reserve_range').value) / 100;
    reservePart = Math.round(m * pct);
    budgetPart  = Math.round(m - reservePart);
    document.getElementById('reserve_pct_hidden').value = Math.round(pct * 100);
  } else {
    reservePart = parseFloat(document.getElementById('input-reserve').value) || 0;
    budgetPart  = parseFloat(document.getElementById('input-budget').value)  || 0;
    const total = reservePart + budgetPart;
    if (total === 0) { preview.style.display = 'none'; btn.disabled = true; return; }
    if (Math.abs(total - m) > 1) {
      alertBox.style.display = 'block';
      alertBox.textContent = `⚠️ Somme saisie (${fmt(total)}) ≠ montant total (${fmt(m)}). Diff : ${fmt(Math.abs(m - total))}`;
      valid = false;
    } else {
      alertBox.style.display = 'none';
    }
    document.getElementById('reserve_montant_hidden').value = Math.round(reservePart);
    document.getElementById('budget_montant_hidden').value  = Math.round(budgetPart);
  }
  preview.style.display = 'block';
  document.getElementById('preview-reserve').textContent = fmt(reservePart);
  document.getElementById('preview-budget').textContent  = fmt(budgetPart);
  const rPct = m > 0 ? Math.round(reservePart / m * 100) : 0;
  document.getElementById('preview-rpct').textContent = rPct + '%';
  document.getElementById('preview-bpct').textContent = (100 - rPct) + '%';
  document.getElementById('bar-reserve').style.width = rPct + '%';
  btn.disabled = !valid;
  btn.classList.toggle('opacity-50', !valid);
  btn.classList.toggle('cursor-not-allowed', !valid);
  btn.classList.toggle('hover:bg-emerald-600', valid);
}

updatePreview();
</script>
{% endblock %}
